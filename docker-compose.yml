version: "3.9"

services:
  app:
    build: .
    volumes:
      - .:/Project
    working_dir: /Project
    command: python main.py

  mongodb:
    container_name: algo-mongodb
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - .docker/mongodb:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    restart: always