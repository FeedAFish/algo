version: "3.9"

services:
  app:
    build: .
    volumes:
      - .:/Project
    working_dir: /Project
    command: python main.py

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: tourisme_data
    volumes:
      - .docker/mongodb:/data/db
    networks:
      - app-network